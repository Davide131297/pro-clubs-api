name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: pro-clubs-api-backend
  REGISTRY: europe-west1-docker.pkg.dev
  IMAGE_NAME: pro-clubs-api/backend

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "${REGISTRY}" --quiet

      - name: Build image
        working-directory: ./backend
        run: |
          docker build \
            -t "${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}:${GITHUB_SHA}" \
            -t "${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}:latest" \
            .

      - name: Push image
        run: |
          docker push "${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${REGISTRY}/${PROJECT_ID}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "NODE_ENV=production,API_BEARER_TOKEN=${{ secrets.API_BEARER_TOKEN }},EA_BASE_URL=${{ vars.EA_BASE_URL || 'https://proclubs.ea.com/api/fc' }}" \
            --quiet
